<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact - Laura's Shop</title>
    <meta name="description" content="Contactez THE K'ROUSEL / Laura's Shop pour toute question sur le scrapbooking ou nos produits.">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>

<body>

    <header>
        <nav class="navbar navbar-expand-lg navbar-light bg-white shadow-sm fixed-top">
            <div class="container">
                <a class="navbar-brand fw-bold" href="index.html" style="color: #6a1b9a;">Laura's Shop</a>
                <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                    <span class="navbar-toggler-icon"></span>
                </button>
                <div class="collapse navbar-collapse" id="navbarNav">
                    <ul class="navbar-nav ms-auto">
                        <li class="nav-item"><a class="nav-link" href="index.html">Accueil</a></li>
                        <li class="nav-item"><a class="nav-link" href="about.html">À propos</a></li>
                        <li class="nav-item"><a class="nav-link active" href="contact.html">Contact</a></li>
                    </ul>
                </div>
            </div>
        </nav>
    </header>

    <main class="container py-5 mt-5">
        <div class="row justify-content-center">
            <div class="col-md-7 col-lg-6">
                <h1 class="text-center mb-4 mt-4" style="color: #6a1b9a;">Contactez-nous</h1>
                <p class="text-center text-muted mb-5">Une question sur nos ateliers ou nos pépites créatives ? Envoyez-moi un message !</p>

                <form action="#" method="POST" class="bg-white p-4 shadow-sm rounded">
                    <div class="mb-3">
                        <label for="nom" class="form-label fw-bold">Votre nom</label>
                        <input type="text" class="form-control" id="nom" name="nom" placeholder="Marie" required>
                    </div>

                    <div class="mb-3">
                        <label for="email" class="form-label fw-bold">Votre adresse email</label>
                        <input type="email" class="form-control" id="email" name="email" placeholder="marie@exemple.com" required>
                    </div>

                    <div class="mb-3">
                        <label for="sujet" class="form-label fw-bold">Sujet de votre demande</label>
                        <select class="form-select" id="sujet" name="sujet" required>
                            <option value="" selected disabled>Choisir une option...</option>
                            <option value="produit">Question sur un produit</option>
                            <option value="tuto">Aide sur un tutoriel</option>
                            <option value="autre">Autre demande</option>
                        </select>
                    </div>

                    <div class="mb-3">
                        <label for="message" class="form-label fw-bold">Votre message</label>
                        <textarea class="form-control" id="message" name="message" rows="5" placeholder="Écrivez ici..." required></textarea>
                    </div>

                    <div class="text-center">
                        <button type="submit" class="btn btn-lg w-100 fw-bold" style="background-color: #6a1b9a; color: white;">
                            Envoyer ma demande
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </main>

    <footer class="py-4 text-center border-top mt-5">
        <p class="mb-0 text-muted">&copy; 2026 Laura's Shop - Créé avec passion par Laura</p>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
