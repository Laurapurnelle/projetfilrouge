<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Laura's Shop - Contact</title>
    <meta name="description" content="Contactez Laura's Shop pour vos projets de scrapbooking.">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>

<body>

    <header>
        <nav class="navbar navbar-expand-lg navbar-light bg-white shadow-sm fixed-top">
            <div class="container">
                <a class="navbar-brand fw-bold an" href="index.html">Laura's Shop</a>
                <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                    <span class="navbar-toggler-icon"></span>
                </button>
                <div class="collapse navbar-collapse" id="navbarNav">
                    <ul class="navbar-nav ms-auto">
                        <li class="nav-item"><a class="nav-link" href="index.html">Accueil</a></li>
                        <li class="nav-item"><a class="nav-link" href="about.html">À propos</a></li>
                        <li class="nav-item"><a class="nav-link active" href="contact.html">Contact</a></li>
                    </ul>
                </div>
            </div>
        </nav>
    </header>

    <main class="container my-5 pt-4">
        <h1 class="text-center mb-5" style="color: #6a1b9a;">Me Contacter</h1>

        <section class="row justify-content-center">
            <div class="col-md-8 col-lg-6">
                <form id="contactForm" class="p-4 bg-white rounded shadow-sm">
                    <div class="mb-3">
                        <label for="name" class="form-label text-custom fw-bold">Nom & Prénom</label>
                        <input type="text" class="form-control" id="name" name="name" placeholder="Marie Dupont"
                            required>
                    </div>
                    <div class="mb-3">
                        <label for="email" class="form-label text-custom fw-bold">Adresse Email</label>
                        <input type="email" class="form-control" id="email" name="email"
                            placeholder="marie.dupont@email.com" required>
                    </div>
                    <div class="mb-3">
                        <label for="message" class="form-label text-custom fw-bold">Votre Message</label>
                        <textarea class="form-control" id="message" name="message" rows="5"
                            placeholder="Bonjour Laura, j'aimerais..." required></textarea>
                    </div>
                    <div class="text-center mt-4">
                        <button type="submit" class="btn text-white w-100 fw-bold" style="background-color: #6a1b9a;">
                            Envoyer le message
                        </button>
                    </div>
                </form>
            </div>
        </section>
    </main>

    <footer class="py-4 text-center border-top">
        <p class="mb-0 text-muted small">&copy; 2026 Laura's Shop - Un univers, Mon univers</p>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
